openapi: 3.0.3
info:
  title: Adonis Field Operations API
  version: 1.0.0
  description: |
    Exhaustive OpenAPI specification for the current AdonisJS API surface.

    Notes:
    - Routes are documented exactly as implemented in start/routes.ts.
    - Some endpoints that are often protected in production are currently not guarded by auth middleware in code.
    - Pagination schemas match Adonis Lucid paginator JSON shape at a practical level (meta + data).
servers:
  - url: /
    description: Base server URL

tags:
  - name: Health
  - name: Auth
  - name: Account
  - name: Dashboard
  - name: Organizations
  - name: App Users
  - name: Devices
  - name: Crop Types
  - name: Farmers
  - name: Plots
  - name: Observations
  - name: Attachments
  - name: Sync Queue
  - name: Audit Logs

paths:
  /:
    get:
      tags: [Health]
      summary: Root health check
      operationId: getRootHealth
      responses:
        '200':
          description: Root service metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  hello:
                    type: string
                  version:
                    type: string
                required: [hello, version]

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create account and return access token
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and return access token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate access token
      operationId: refreshToken
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      operationId: logoutAll
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out all sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/tokens:
    get:
      tags: [Auth]
      summary: List active tokens for current user
      operationId: listTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthTokenInfo'

  /api/v1/auth/tokens/{tokenId}:
    delete:
      tags: [Auth]
      summary: Revoke specific token
      operationId: revokeToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Trigger password reset flow
      operationId: forgotPassword
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset initiation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Complete password reset
      operationId: resetPassword
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/email/verification-notification:
    post:
      tags: [Auth]
      summary: Send email verification notification
      operationId: sendEmailVerification
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification email response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/email/verify:
    post:
      tags: [Auth]
      summary: Verify email token
      operationId: verifyEmail
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/account/profile:
    get:
      tags: [Account]
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
    patch:
      tags: [Account]
      summary: Update current user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Account]
      summary: Delete current user account
      operationId: deleteProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Unified dashboard aggregate
      operationId: dashboardIndex
      responses:
        '200':
          description: Aggregated dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardIndexResponse'

  /api/v1/dashboard/farmer-counts:
    get:
      tags: [Dashboard]
      summary: Farmer counts view
      operationId: dashboardFarmerCounts
      responses:
        '200':
          description: Farmer counts per organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardFarmerCount'

  /api/v1/dashboard/yield-summary:
    get:
      tags: [Dashboard]
      summary: Yield summary view
      operationId: dashboardYieldSummary
      responses:
        '200':
          description: Yield summary per crop type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardYieldSummary'

  /api/v1/dashboard/sync-status:
    get:
      tags: [Dashboard]
      summary: Sync status view
      operationId: dashboardSyncStatus
      responses:
        '200':
          description: Sync status by device
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardSyncStatus'

  /api/v1/dashboard/health:
    get:
      tags: [Dashboard]
      summary: API and DB health check
      operationId: dashboardHealth
      responses:
        '200':
          description: Healthy status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Unhealthy status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthFailureResponse'

  /api/v1/organizations:
    get:
      tags: [Organizations]
      summary: List organizations
      operationId: listOrganizations
      parameters:
        - $ref: '#/components/parameters/TypeQuery'
        - $ref: '#/components/parameters/RegionQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganization'
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get organization by id
      operationId: getOrganization
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Organization with preloaded farmers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Organization'
                  - type: object
                    properties:
                      farmers:
                        type: array
                        items:
                          $ref: '#/components/schemas/Farmer'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Organizations]
      summary: Update organization
      operationId: updateOrganization
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Organizations]
      summary: Delete organization
      operationId: deleteOrganization
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '204':
          description: Organization deleted

  /api/v1/organizations/{id}/dashboard:
    get:
      tags: [Organizations]
      summary: Organization dashboard snapshot
      operationId: organizationDashboard
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Dashboard data or no data message
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DashboardFarmerCount'
                  - $ref: '#/components/schemas/MessageResponse'

  /api/v1/app-users:
    get:
      tags: [App Users]
      summary: List app users
      operationId: listAppUsers
      parameters:
        - name: organizationId
          in: query
          schema: { type: string, format: uuid }
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, field_agent, supervisor]
        - name: isActive
          in: query
          schema: { type: boolean }
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated app users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppUser'
    post:
      tags: [App Users]
      summary: Create app user
      operationId: createAppUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppUserRequest'
      responses:
        '201':
          description: App user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppUser'

  /api/v1/app-users/{id}:
    get:
      tags: [App Users]
      summary: Get app user by id
      operationId: getAppUser
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: App user with organization and devices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AppUser'
                  - type: object
                    properties:
                      organization:
                        $ref: '#/components/schemas/Organization'
                      devices:
                        type: array
                        items:
                          $ref: '#/components/schemas/Device'
    patch:
      tags: [App Users]
      summary: Update app user
      operationId: updateAppUser
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppUserRequest'
      responses:
        '200':
          description: Updated app user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppUser'
    delete:
      tags: [App Users]
      summary: Deactivate or hard-delete app user
      operationId: deleteAppUser
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
        - name: hard
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Soft deactivation message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '204':
          description: Hard deleted

  /api/v1/app-users/{id}/activate:
    patch:
      tags: [App Users]
      summary: Reactivate app user
      operationId: activateAppUser
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Activation success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/app-users/{id}/devices:
    get:
      tags: [App Users]
      summary: List devices for app user
      operationId: listAppUserDevices
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Devices for user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

  /api/v1/devices:
    get:
      tags: [Devices]
      summary: List devices
      operationId: listDevices
      parameters:
        - name: userId
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDevice'
    post:
      tags: [Devices]
      summary: Create device
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'

  /api/v1/devices/{id}:
    get:
      tags: [Devices]
      summary: Get device by id
      operationId: getDevice
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Device with user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Device'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AppUser'
    patch:
      tags: [Devices]
      summary: Update device
      operationId: updateDevice
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceRequest'
      responses:
        '200':
          description: Updated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
    delete:
      tags: [Devices]
      summary: Delete device
      operationId: deleteDevice
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '204':
          description: Device deleted

  /api/v1/devices/by-uuid/{deviceUuid}:
    get:
      tags: [Devices]
      summary: Get device by hardware UUID
      operationId: getDeviceByUuid
      parameters:
        - name: deviceUuid
          in: path
          required: true
          schema:
            type: string
            maxLength: 255
      responses:
        '200':
          description: Device with user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Device'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AppUser'

  /api/v1/devices/{id}/sync:
    patch:
      tags: [Devices]
      summary: Mark device synced now
      operationId: markDeviceSynced
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Sync stamp updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  lastSyncAt: { type: string, format: date-time, nullable: true }

  /api/v1/crop-types:
    get:
      tags: [Crop Types]
      summary: List crop types
      operationId: listCropTypes
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Crop type list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CropType'
    post:
      tags: [Crop Types]
      summary: Create crop type
      operationId: createCropType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCropTypeRequest'
      responses:
        '201':
          description: Crop type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CropType'

  /api/v1/crop-types/categories:
    get:
      tags: [Crop Types]
      summary: List distinct crop categories
      operationId: listCropCategories
      responses:
        '200':
          description: Distinct categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v1/crop-types/{id}:
    get:
      tags: [Crop Types]
      summary: Get crop type
      operationId: getCropType
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Crop type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CropType'
    patch:
      tags: [Crop Types]
      summary: Update crop type
      operationId: updateCropType
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCropTypeRequest'
      responses:
        '200':
          description: Updated crop type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CropType'
    delete:
      tags: [Crop Types]
      summary: Delete crop type
      operationId: deleteCropType
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '204':
          description: Crop type deleted

  /api/v1/farmers:
    get:
      tags: [Farmers]
      summary: List farmers
      operationId: listFarmers
      parameters:
        - name: organizationId
          in: query
          schema: { type: string, format: uuid }
        - name: region
          in: query
          schema: { type: string }
        - name: zone
          in: query
          schema: { type: string }
        - name: woreda
          in: query
          schema: { type: string }
        - name: createdBy
          in: query
          schema: { type: string, format: uuid }
        - name: deviceId
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string }
        - name: includeDeleted
          in: query
          schema: { type: boolean, default: false }
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated farmers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFarmer'
    post:
      tags: [Farmers]
      summary: Create farmer
      operationId: createFarmer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFarmerRequest'
      responses:
        '201':
          description: Farmer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Farmer'

  /api/v1/farmers/stats:
    get:
      tags: [Farmers]
      summary: Farmer counts by region
      operationId: farmerStats
      parameters:
        - name: organizationId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Regional farmer counts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    location_region:
                      type: string
                      nullable: true
                    total:
                      type: integer

  /api/v1/farmers/{id}:
    get:
      tags: [Farmers]
      summary: Get farmer
      operationId: getFarmer
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Farmer with relations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Farmer'
                  - type: object
                    properties:
                      organization:
                        $ref: '#/components/schemas/Organization'
                      creator:
                        $ref: '#/components/schemas/AppUser'
                      device:
                        $ref: '#/components/schemas/Device'
                      plots:
                        type: array
                        items:
                          $ref: '#/components/schemas/Plot'
    patch:
      tags: [Farmers]
      summary: Update farmer
      operationId: updateFarmer
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFarmerRequest'
      responses:
        '200':
          description: Updated farmer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Farmer'
    delete:
      tags: [Farmers]
      summary: Soft-delete farmer
      operationId: deleteFarmer
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Soft-delete confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdMessageResponse'

  /api/v1/farmers/{id}/restore:
    post:
      tags: [Farmers]
      summary: Restore soft-deleted farmer
      operationId: restoreFarmer
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Restore confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdMessageResponse'

  /api/v1/farmers/{id}/plots:
    get:
      tags: [Farmers]
      summary: List active plots for farmer
      operationId: listFarmerPlots
      parameters:
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Farmer plots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plot'

  /api/v1/plots:
    get:

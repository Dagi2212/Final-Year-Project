components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UuidIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TokenIdPath:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        maxLength: 255
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20
    Limit50Query:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 50
    TypeQuery:
      name: type
      in: query
      schema:
        type: string
        enum: [cooperative, ngo, government, private]
    RegionQuery:
      name: region
      in: query
      schema:
        type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
        errors:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    IdMessageResponse:
      type: object
      properties:
        message: { type: string }
        id: { type: string, format: uuid }
      required: [message, id]

    VersionConflict:
      type: object
      properties:
        message: { type: string }
        serverVersion: { type: integer }
      required: [message, serverVersion]

    PaginationMeta:
      type: object
      properties:
        total: { type: integer }
        perPage: { type: integer }
        currentPage: { type: integer }
        lastPage: { type: integer }
        firstPage: { type: integer }
        firstPageUrl: { type: string, nullable: true }
        lastPageUrl: { type: string, nullable: true }
        nextPageUrl: { type: string, nullable: true }
        previousPageUrl: { type: string, nullable: true }

    PublicUser:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string, nullable: true }
        email: { type: string, format: email }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        initials: { type: string }
      required: [id, email, createdAt, initials]

    AuthSuccess:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        token:
          type: string
      required: [user, token]

    AuthTokenInfo:
      type: object
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        type: { type: string }
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        isCurrent: { type: boolean }

    SignupRequest:
      type: object
      properties:
        fullName: { type: string, maxLength: 120, nullable: true }
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 8, maxLength: 32 }
        passwordConfirmation: { type: string, minLength: 8, maxLength: 32 }
        deviceName: { type: string, maxLength: 80 }
      required: [email, password, passwordConfirmation]

    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string }
        deviceName: { type: string, maxLength: 80 }
      required: [email, password]

    RefreshTokenRequest:
      type: object
      properties:
        deviceName: { type: string, maxLength: 80 }

    UpdateProfileRequest:
      type: object
      properties:
        fullName: { type: string, maxLength: 120, nullable: true }
        email: { type: string, format: email, maxLength: 254 }

    DeleteAccountRequest:
      type: object
      properties:
        password: { type: string }
      required: [password]

    ForgotPasswordRequest:
      type: object
      properties:
        email: { type: string, format: email, maxLength: 254 }
      required: [email]

    ResetPasswordRequest:
      type: object
      properties:
        token: { type: string, maxLength: 512 }
        password: { type: string, minLength: 8, maxLength: 32 }
        passwordConfirmation: { type: string, minLength: 8, maxLength: 32 }
      required: [token, password, passwordConfirmation]

    VerifyEmailRequest:
      type: object
      properties:
        token: { type: string, maxLength: 512 }
      required: [token]

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, maxLength: 255 }
        type:
          type: string
          nullable: true
          enum: [cooperative, ngo, government, private]
        region: { type: string, nullable: true, maxLength: 100 }
        contactPhone: { type: string, nullable: true, maxLength: 20 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name]

    AppUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid, nullable: true }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        fullName: { type: string, maxLength: 255 }
        phone: { type: string, nullable: true, maxLength: 20 }
        role:
          type: string
          nullable: true
          enum: [admin, field_agent, supervisor]
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, fullName]

    Device:
      type: object
      properties:

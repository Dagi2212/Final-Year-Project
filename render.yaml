services:
  # ==========================================================================
  # Backend — AdonisJS REST API
  # ==========================================================================
  - type: web
    name: iads-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: ./bin/production-start.sh
    healthCheckPath: /
    envVars:
      # ── Node ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info

      # ── App ───────────────────────────────────────────────────────────
      - key: APP_KEY
        sync: false
      - key: APP_URL
        fromService:
          name: iads-api
          type: web
          property: host

      # ── Frontend (Vercel) ─────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://agri-data-iota.vercel.app

      # ── Session / Limiter (in-memory, no DB table needed) ────────────
      - key: SESSION_DRIVER
        value: cookie
      - key: LIMITER_STORE
        value: memory

      # ── Database (PostgreSQL) ─────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── ML microservice ───────────────────────────────────────────────
      - key: ML_SERVICE_URL
        fromService:
          name: iads-ml-service
          type: web
          property: host

      # ── SMTP (set in Dashboard) ───────────────────────────────────────
      - key: MAIL_MAILER
        value: smtp
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false

      # ── RAG LLM providers (set in Dashboard) ─────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      # ── Chapa Payment Gateway ─────────────────────────────────────────
      - key: CHAPA_SECRET_KEY
        sync: false

  # ==========================================================================
  # ML Service — Python FastAPI yield prediction
  # ==========================================================================
  - type: web
    name: iads-ml-service
    runtime: python
    region: oregon
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
